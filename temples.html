  <link rel="preconnect" href="https://fonts.googleapis.com">

    <nav id="primary-nav" class="primary-nav">

  <main>
    <h1>Temples of the Church</h1>
    <p class="lede">A small gallery of temples from around the world.</p>

    <div class="temple-grid">
      <figure>

      <figure>

      </figure>

      <figure>
        <img src="images\salt_lake_temple.webp" alt="Salt Lake Temple" loading="lazy" width="400" height="300">
        <figcaption>Salt Lake Temple</figcaption>
      </figure>

      <figure>
        <img src="images\washington_dc_temple.webp" alt="Washington D.C. Temple" loading="lazy" width="400" height="300">

      </figure>

      <figure>
        <img src="images\denver_colorado_temple.webp" alt="Denver Colorado Temple" loading="lazy" width="400" height="300">

      <figure>

      <figure>
        <img src="images\chicago_illinois_temple.webp" alt="Chicago Illinois Temple" loading="lazy" width="400" height="300">
        <figcaption>Chicago Illinois Temple</figcaption>
      </figure>

  </main>

  <footer class="site-footer">
